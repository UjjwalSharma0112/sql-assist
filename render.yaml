databases:
  - name: sql-assist-db
    plan: free

services:
  # 1. Backend FastAPI Service
  - type: web
    name: sql-assist-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sql-assist-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        value: placeholder-change-me # Replace with your Gemini API Key in the Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*" # Change this to your frontend URL once generated

  # 2. Frontend Next.js Service
  - type: web
    name: sql-assist-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sql-assist-backend.onrender.com/api/v1 # Update if Render assigns a different URL to the backend
